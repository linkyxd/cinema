name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      - name: Compile
        run: mvn -B compile -q

      - name: Test
        run: mvn -B test -q -Dspring.profiles.active=test

      - name: Package
        run: mvn -B package -q -DskipTests

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cinema-jar
          path: target/cinema-*.jar
