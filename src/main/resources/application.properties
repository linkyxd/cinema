# Database - sensitive values from environment
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/cinema}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# H2 console (disabled by default for production)
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

logging.level.org.hibernate.SQL=DEBUG

# JWT (sensitive values from env)
app.jwt.secret=${JWT_SECRET:your-256-bit-secret-key-for-jwt-signing-change-in-production}
app.jwt.access-expiry-ms=900000
app.jwt.refresh-expiry-ms=604800000
