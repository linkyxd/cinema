# TLS profile: -Dspring.profiles.active=tls
# Default: certs in project folder. Override via KEYSTORE_PATH / KEYSTORE_PASSWORD
server.port=8443
server.ssl.enabled=true
server.ssl.key-store=${KEYSTORE_PATH:file:${user.dir}/certs/cinema-keystore.p12}
server.ssl.key-store-password=${KEYSTORE_PASSWORD:changeit}
server.ssl.key-password=${KEYSTORE_PASSWORD:changeit}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=cinema-server